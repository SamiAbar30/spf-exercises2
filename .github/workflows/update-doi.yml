name: Update DOI from Zenodo

on:
  release:
    types: [published]

jobs:
  update-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch DOI from Zenodo
        id: fetch_doi
        run: |
          # Replace with your actual Zenodo deposition ID or use the Zenodo API to find it
          # For this exercise, we simulate the process by searching for the DOI in the Zenodo API
          REPO_NAME="${{ github.event.repository.name }}"
          # This is a placeholder for the actual API call to Zenodo to get the DOI
          # In a real scenario, Zenodo provides the DOI in the release event or via API
          # We'll use a placeholder for the user to manually update once or use a script
          echo "DOI=10.5281/zenodo.${{ github.event.release.id }}" >> $GITHUB_ENV

      - name: Update README.md and codemeta.json
        run: |
          sed -i "s|\[INSERT_YOUR_ZENODO_DOI_HERE\]|${{ env.DOI }}|g" README.md
          sed -i "s|\[INSERT_YOUR_ZENODO_DOI_HERE\]|${{ env.DOI }}|g" codemeta.json

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md codemeta.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update DOI to ${{ env.DOI }} [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.event.repository.default_branch }}
          fi
